<svg viewBox="0 0 1440 720" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EFEAE0" stop-opacity="0"/>
      <stop offset="1" stop-color="#EFEAE0" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="28%" r="60%">
      <stop offset="0" stop-color="#B8A269" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#B8A269" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1440" height="720" fill="url(#glow)"/>
  <!-- Quiet route arcs: movement between two regions, abstracted -->
  <g fill="none" stroke="#14213A" stroke-opacity="0.07" stroke-width="1">
    <path d="M120 540 C 460 300, 980 300, 1320 200"/>
    <path d="M120 580 C 480 360, 1000 360, 1320 260"/>
    <path d="M120 500 C 440 240, 960 240, 1320 140"/>
  </g>
  <g fill="none" stroke="#B8A269" stroke-opacity="0.22" stroke-width="1.2">
    <path d="M120 540 C 460 300, 980 300, 1320 200" stroke-dasharray="2 9"/>
  </g>
  <!-- Two anchor nodes -->
  <circle cx="120" cy="540" r="4" fill="#14213A" fill-opacity="0.25"/>
  <circle cx="1320" cy="200" r="4" fill="#B8A269" fill-opacity="0.6"/>
  <circle cx="1320" cy="200" r="11" fill="none" stroke="#B8A269" stroke-opacity="0.25"/>
  <rect width="1440" height="720" fill="url(#fade)"/>
</svg>
