<script>
/* Optional, non-aggressive browser-language hint. Users retain full manual control. */
(function () {
  try {
    var supported = { en: "/en/", ar: "/ar/", de: "/de/" };
    var langs = (navigator.languages || [navigator.language || "en"]);
    for (var i = 0; i < langs.length; i++) {
      var code = (langs[i] || "").slice(0, 2).toLowerCase();
      if (supported[code]) {
        var box = document.querySelector(".gateway-langs");
        if (box) {
          var hint = document.createElement("p");
          hint.className = "gateway-foot";
          hint.style.marginTop = "1.4rem";
          var label = { en: "Continue in English", ar: "المتابعة بالعربية", de: "Auf Deutsch fortfahren" }[code];
          hint.innerHTML = '<a href="' + supported[code] + '">' + label + ' →</a>';
          box.parentNode.insertBefore(hint, box.nextSibling);
        }
        break;
      }
    }
  } catch (e) {}
})();
